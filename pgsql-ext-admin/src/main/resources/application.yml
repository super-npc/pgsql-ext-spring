auto-table:
  # 开启自动建表
  enable: false
  record-sql:
    # 开启SQL记录
    enable: true
    # 当前版本（此处可保持与计划上线的版本号一致，方便管理SQL文件）
    version: 1.0.0
    # 记录到数据库（如果是多数据源，则会根据不同数据源，记录到不同的库）
    record-type: db
spring:
  application:
    name: pgsql-ext-admin
  profiles:
    active: dev
    include:
      - project
project:
  dashboard: false

server:
  port: 9019

sa:
  auth: false
  name: admin
  pwd: admin
  exclude: "/demo/pgmq/**"

arthas:
  tunnel-server: ws://arthas:7777/ws  # Arthas Tunnel Server 地址

# PgMQ 配置
pgmq:
  consumer-enabled: true  # 是否启用消费者，默认 true
