spring:
  application:
    name: pgsql-ext-admin
  profiles:
    active: dev
    include:
      - project
project:
  dashboard: false

server:
  port: 9019

sa:
  auth: true
  name: admin
  pwd: admin

arthas:
  agent-id: ${spring.application.name}
  tunnel-server: ws://arthas:7777/ws  # Arthas Tunnel Server 地址
  telnet-port: 0  # 随机端口
  http-port: 0    # 随机端口

# PgMQ 配置
pgmq:
  consumer-enabled: true  # 是否启用消费者，默认 true
